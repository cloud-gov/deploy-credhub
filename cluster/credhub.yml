---
name: ((deployment_name))

releases:
  - name: credhub
    version: latest
  - name: bpm
    version: latest

instance_groups:
  - name: credhub
    instances: ((instances))
    azs: ((azs))
    networks: 
    - name: ((network_name))
    stemcell: xenial
    vm_type: ((credhub_vm_type))
    vm_extensions: credhub-lb
    jobs:
      - name: bpm
        release: bpm
      - name: credhub
        release: credhub
        properties:
          bpm:
            enabled: true
          credhub:
            authorization:
              acls:
                enabled: true
              permissions:
                - path: /*
                  actors: ["uaa-client:credhub_admin_client"]
                  operations: [read, write, delete, read_acl, write_acl]
            authentication:
              uaa:
                url: https://opsuaa.fr.cloud.gov
                verification_key: ((/toolingbosh/opsuaa/uaa_jwt_signing_key.public_key))
                ca_certs:
                  - ((/master-bosh-ca.certificate))
                enabled: true
              mutual_tls:
                trusted_cas: [((/master-bosh-ca.certificate))]
            data_storage:
              type: postgres
              username: ((db_username))
              password: ((db_password))
              host: ((db_host))
              port: ((db_port))
              database: credhub
              require_tls: true
              tls_ca: ((postgres_ca_cert))
            encryption:
              keys:
                - provider_name: int
                  key_properties:
                    encryption_password: ((credhub-encryption-password))
                  active: true
              providers:
                - name: int
                  type: internal
            tls: ((credhub-tls))

variables:
  - name: credhub-encryption-password
    type: password
    options:
      length: 40
  - name: credhub-admin-client-password
    type: password
  - name: credhub-admin-user-password
    type: password
  - name: credhub-tls
    type: certificate
    options: 
      ca: /master-bosh-ca
      common_name: ((common_name))
      alternative_names:
      - 127.0.0.1

stemcells:
  - alias: xenial
    os: ubuntu-xenial
    version: latest

vm_extensions:
- name: credhub-lb
  cloud_properties:
    lb_target_groups:
    - credhub-lb-target-group
  
update:
  canaries: 1
  max_in_flight: 1
  update_watch_time: 120000
  canary_watch_time: 120000
